<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dice Addiction • Mathive</title>

  <style>
    :root{
      --c1:#8ECAE6;
      --c2:#90BE6D;
      --c3:#FFB703;
      --ink:#1b1b1b;
      --muted:#555;
      --card:#ffffff;
      --shadow:0 10px 26px rgba(0,0,0,.08);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: ui-rounded, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(60vmax 60vmax at 100% 0%, var(--c1) 0 25%, transparent 26%),
        radial-gradient(65vmax 65vmax at 0% 100%, var(--c2) 0 22%, transparent 23%),
        linear-gradient(180deg, #fff, #fff);
      min-height:100vh;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .game-topbar{
      background:#ffffff;
      border-radius:20px;
      box-shadow:0 10px 26px rgba(0,0,0,.08);
      padding:14px 16px;
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:14px;
      align-items:center;
    }

    .top-left{
      min-width:180px;
    }

    .game-title{
      font-size:22px;
      font-weight:1000;
      color:#1b1b1b;
    }

    .game-subtitle{
      margin-top:3px;
      font-size:13px;
      color:#555;
      font-weight:700;
    }

    .top-center{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:8px;
    }

    .top-pill{
      background:#f6f6f6;
      padding:9px 12px;
      border-radius:999px;
      font-size:14px;
      font-weight:1000;
      color:#1b1b1b;
    }

    .top-right{
      display:flex;
      gap:8px;
      justify-content:flex-end;
    }

    .top-btn{
      border:none;
      border-radius:14px;
      padding:10px 16px;
      font-size:14px;
      font-weight:1000;
      cursor:pointer;
    }

    .restart-btn{
      background:#8ECAE6;
      color:#0b2a33;
    }

    .quit-btn{
      background:#F28482;
      color:white;
    }

    .restart-btn:hover,
    .quit-btn:hover{
      filter:brightness(.96);
    }

    main{
      flex:1;
      display:grid;
      place-items:center;
    }

    .game{
      width:min(92vw,540px);
      background:var(--card);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:18px;
      text-align:center;
    }

    .difficulty{
      display:flex;
      justify-content:center;
      gap:8px;
      margin:10px 0 6px;
      flex-wrap:wrap;
    }

    .difficulty button{
      border:none;
      border-radius:999px;
      padding:8px 14px;
      font-weight:900;
      cursor:pointer;
      background:#eee;
    }

    .difficulty .active{
      background:var(--c2);
      color:#0b2a33;
    }

    .difficulty .locked{
      opacity:.5;
      pointer-events:none;
    }

    .diceRow{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:16px;
      margin:14px 0;
      flex-wrap:wrap;
      min-height:120px;
    }

    .diceRow img{
      width:110px;
      height:110px;
    }

    .answer{
      margin-top:10px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    input{
      width:120px;
      padding:14px;
      font-size:22px;
      font-weight:900;
      border-radius:14px;
      border:2px solid #ddd;
      text-align:center;
    }

    input:focus{
      outline:none;
      border-color:var(--c1);
      box-shadow:0 0 0 3px rgba(142,202,230,.3);
    }

    .submit{
      padding:14px 18px;
      font-size:18px;
      font-weight:900;
      border:none;
      border-radius:14px;
      background:var(--c2);
      cursor:pointer;
    }

    .msg{
      margin-top:12px;
      min-height:28px;
      font-weight:900;
    }

    .good{ color:#2d7a1f; }
    .bad{ color:#b51e1e; }

    @media (max-width: 900px){
      .game-topbar{
        grid-template-columns: 1fr;
        text-align:center;
      }

      .top-left,
      .top-right{
        display:flex;
        flex-direction:column;
        align-items:center;
      }

      .top-right{
        flex-direction:row;
        justify-content:center;
      }
    }
  </style>
</head>
<body>

  <header class="game-topbar">
    <div class="top-left">
      <div class="game-title" id="gameTitle">🎲 Game 1: Dice Addition</div>
      <div class="game-subtitle" id="gameSubtitle">Add the dice as fast as you can!</div>
    </div>

    <div class="top-center">
      <div class="top-pill">⏱ Time: <span id="time">30</span>s</div>
      <div class="top-pill">⭐ Score: <span id="score">0</span></div>
      <div class="top-pill">🔥 Combo: <span id="combo">0</span></div>
    </div>

    <div class="top-right">
      <button class="top-btn restart-btn" onclick="restartGame()">Restart</button>
      <button class="top-btn quit-btn" onclick="quitGame()">Quit</button>
    </div>
  </header>

  <main>
    <section class="game">
      <p><strong>Choose a difficulty to start</strong></p>

      <div class="difficulty">
        <button id="easyBtn" onclick="setDifficulty('easy')">Easy (2 Dice)</button>
        <button id="hardBtn" onclick="setDifficulty('hard')">Hard (3 Dice)</button>
      </div>

      <div class="diceRow" id="diceRow"></div>

      <div class="answer">
        <input id="answer" type="number" placeholder="?" disabled />
        <button class="submit" onclick="checkAnswer()" disabled id="submitBtn">✔</button>
      </div>

      <div class="msg" id="msg"></div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<script>
  let audioStarted = false;

  function initAudio(){
    if(audioStarted) return;
    audioStarted = true;

    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if(!AudioContextClass) return;

    window.gameAudioCtx = new AudioContextClass();
  }

  function playTone(freq, duration, type = 'sine', volume = 0.05){
    if(!window.gameAudioCtx) return;

    const ctx = window.gameAudioCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = type;
    osc.frequency.value = freq;

    gain.gain.value = volume;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();

    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.stop(ctx.currentTime + duration);
  }

  function playCorrectSound(){
    playTone(660, 0.12, 'sine', 0.06);
    setTimeout(() => playTone(880, 0.14, 'sine', 0.05), 80);
  }

  function playWrongSound(){
    playTone(220, 0.18, 'square', 0.05);
    setTimeout(() => playTone(180, 0.2, 'square', 0.04), 90);
  }

  function playHighScoreSound(){
    playTone(523, 0.12, 'triangle', 0.06);
    setTimeout(() => playTone(659, 0.12, 'triangle', 0.06), 100);
    setTimeout(() => playTone(784, 0.2, 'triangle', 0.06), 200);
  }

  function celebrateHighScore(){
    if(typeof confetti !== 'function') return;

    confetti({
      particleCount: 140,
      spread: 90,
      origin: { y: 0.6 }
    });

    setTimeout(() => {
      confetti({
        particleCount: 80,
        angle: 60,
        spread: 70,
        origin: { x: 0.1, y: 0.7 }
      });

      confetti({
        particleCount: 80,
        angle: 120,
        spread: 70,
        origin: { x: 0.9, y: 0.7 }
      });
    }, 200);
  }

  function readProfile(){
    const raw = sessionStorage.getItem('mq_profile') || localStorage.getItem('mq_profile');
    if(!raw) return null;
    try{
      return JSON.parse(raw);
    }catch{
      return null;
    }
  }

  if(!readProfile()){
    window.location.replace('../index.html');
  }

  let timeLeft = 30;
  let score = 0;
  let combo = 0;
  let diceCount = 0;
  let diceValues = [];
  let timer = null;
  let started = false;
  let ended = false;

  const timeEl = document.getElementById('time');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const msgEl = document.getElementById('msg');
  const ansEl = document.getElementById('answer');
  const diceRow = document.getElementById('diceRow');
  const submitBtn = document.getElementById('submitBtn');
  const easyBtn = document.getElementById('easyBtn');
  const hardBtn = document.getElementById('hardBtn');

  function randDice(){
    return Math.floor(Math.random() * 6) + 1;
  }

  function updateHUD(){
    timeEl.textContent = timeLeft;
    scoreEl.textContent = score;
    comboEl.textContent = combo;
  }

  function setDifficulty(level){
    initAudio();
    if(started) return;

    diceCount = level === 'hard' ? 3 : 2;

    easyBtn.classList.toggle('active', level === 'easy');
    hardBtn.classList.toggle('active', level === 'hard');

    easyBtn.classList.add('locked');
    hardBtn.classList.add('locked');

    started = true;
    ended = false;

    ansEl.disabled = false;
    submitBtn.disabled = false;

    newRoll();
    startTimer();
    ansEl.focus();
  }

  function newRoll(){
    diceValues = [];
    diceRow.innerHTML = '';

    for(let i = 0; i < diceCount; i++){
      const v = randDice();
      diceValues.push(v);

      const img = document.createElement('img');
      img.src = `../assets/dice${v}.png`;
      img.alt = `Dice ${v}`;
      diceRow.appendChild(img);
    }

    ansEl.value = '';
    ansEl.focus();
  }

  function checkAnswer(){
    if(!started || ended || timeLeft <= 0) return;

    const user = Number(ansEl.value);
    const correct = diceValues.reduce((a, b) => a + b, 0);

    if(user === correct){
      playCorrectSound();
      combo++;
      score += 10;

      if(combo > 0 && combo % 5 === 0){
        score += 20;
        msgEl.textContent = `Correct! Bonus +20 🎉`;
      } else {
        msgEl.textContent = `Correct! 🎉`;
      }

      msgEl.className = 'msg good';
      newRoll();
    } else {
      playWrongSound();
      combo = 0;
      score = Math.max(0, score - 10);
      msgEl.textContent = 'Oops! Try again 🙂';
      msgEl.className = 'msg bad';
    }

    updateHUD();

    setTimeout(() => {
      if(!ended){
        msgEl.textContent = '';
        msgEl.className = 'msg';
      }
    }, 700);
  }

  function saveHighScore(){
    let highScore = Number(localStorage.getItem('game1HighScore')) || 0;

    if(score > highScore){
      localStorage.setItem('game1HighScore', score);
      highScore = score;
      playHighScoreSound();
      celebrateHighScore();
    }

    return highScore;
  }

  function startTimer(){
    timer = setInterval(() => {
      timeLeft--;
      updateHUD();

      if(timeLeft <= 0){
        endGame();
      }
    }, 1000);
  }

  async function endGame(){
    if(ended) return;

    clearInterval(timer);
    ended = true;
    timeLeft = 0;
    updateHUD();

    ansEl.disabled = true;
    submitBtn.disabled = true;

    const highScore = saveHighScore();

    try{
      await submitScore(1, score);
    }catch(error){
      console.error("Submit score failed:", error);
    }

    msgEl.textContent = `⏰ Time’s up! Final Score: ${score} | High Score: ${highScore}`;
    msgEl.className = 'msg';
  }

  function quitGame(){
    const leave = confirm("Quit the game and go back to Home?");
    if(leave){
      window.location.href = "../home.html";
    }
  }

  function restartGame(){
    location.reload();
  }

  ansEl.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      checkAnswer();
    }
  });

  updateHUD();
</script>

</body>
</html>
