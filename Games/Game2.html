<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game 2 • Digit Drop Frenzy</title>
  <style>
    :root{
      --c1:#8ECAE6; --c2:#90BE6D; --c3:#FFB703; --c4:#FB8500; --c5:#F28482;
      --ink:#1b1b1b; --muted:#555; --card:#ffffff;
      --shadow:0 10px 26px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-rounded, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(60vmax 60vmax at 0% 0%, var(--c3) 0 22%, transparent 23%),
        radial-gradient(65vmax 65vmax at 100% 100%, var(--c1) 0 22%, transparent 23%),
        linear-gradient(180deg, #fff, #fff);
      min-height:100vh;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .wrap{
      flex:1;
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
      align-items:start;
    }

    .panel{
      background:var(--card);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:14px;
    }

    .center{
      text-align:center;
      margin-top:10px;
    }

    .bigNum{
      font-size:56px;
      font-weight:1000;
      letter-spacing:1px;
      margin:8px 0 0;
    }

    .need{
      display:inline-block;
      margin-top:10px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(142,202,230,.35);
      font-weight:1000;
    }

    .difficulty{
      display:flex;
      justify-content:center;
      gap:8px;
      margin-top:10px;
      flex-wrap:wrap;
    }

    .difficulty button{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      font-weight:1000;
      cursor:pointer;
      background:#eee;
    }

    .difficulty .active{
      background:var(--c2);
      color:#0b2a33;
    }

    .difficulty .locked{
      opacity:.55;
      pointer-events:none;
    }

    .arena{
      position:relative;
      height:420px;
      border-radius:18px;
      background: linear-gradient(180deg, rgba(142,202,230,.18), rgba(144,190,109,.10));
      overflow:hidden;
      margin-top:12px;
      border:2px solid rgba(0,0,0,.06);
    }

    .digit{
      position:absolute;
      width:64px;
      height:64px;
      border-radius:18px;
      display:grid;
      place-items:center;
      font-size:28px;
      font-weight:1000;
      user-select:none;
      cursor:pointer;
      box-shadow:0 10px 18px rgba(0,0,0,.10);
      border:2px solid rgba(0,0,0,.08);
    }

    .digit:active{
      transform:scale(.98);
    }

    .msg{
      margin-top:10px;
      min-height:26px;
      font-weight:1000;
      text-align:center;
    }

    .good{ color:#2d7a1f; }
    .bad{ color:#b51e1e; }

    .hint{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      margin-top:8px;
    }

    .game-topbar{
      background:#ffffff;
      border-radius:20px;
      box-shadow:0 10px 26px rgba(0,0,0,.08);
      padding:14px 16px;
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:14px;
      align-items:center;
    }

    .top-left{
      min-width:180px;
    }

    .game-title{
      font-size:22px;
      font-weight:1000;
      color:#1b1b1b;
    }

    .game-subtitle{
      margin-top:3px;
      font-size:13px;
      color:#555;
      font-weight:700;
    }

    .top-center{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:8px;
    }

    .top-pill{
      background:#f6f6f6;
      padding:9px 12px;
      border-radius:999px;
      font-size:14px;
      font-weight:1000;
      color:#1b1b1b;
    }

    .top-right{
      display:flex;
      gap:8px;
      justify-content:flex-end;
    }

    .top-btn{
      border:none;
      border-radius:14px;
      padding:10px 16px;
      font-size:14px;
      font-weight:1000;
      cursor:pointer;
    }

    .restart-btn{
      background:#8ECAE6;
      color:#0b2a33;
    }

    .quit-btn{
      background:#F28482;
      color:white;
    }

    .restart-btn:hover,
    .quit-btn:hover{
      filter:brightness(.96);
    }

    @media (max-width: 900px){
      .game-topbar{
        grid-template-columns:1fr;
        text-align:center;
      }

      .top-left,
      .top-right{
        display:flex;
        flex-direction:column;
        align-items:center;
      }

      .top-right{
        flex-direction:row;
        justify-content:center;
      }
    }
  </style>
</head>
<body>

<header class="game-topbar">
  <div class="top-left">
    <div class="game-title" id="gameTitle">🔢 Game 2: Digit Drop Frenzy</div>
    <div class="game-subtitle" id="gameSubtitle">Click the correct place value digit!</div>
  </div>

  <div class="top-center">
    <div class="top-pill">⏱ Time: <span id="time">30</span>s</div>
    <div class="top-pill">⭐ Score: <span id="score">0</span></div>
    <div class="top-pill">🔥 Combo: <span id="combo">0</span></div>
  </div>

  <div class="top-right">
    <button class="top-btn restart-btn" onclick="restartGame()">Restart</button>
    <button class="top-btn quit-btn" onclick="quitGame()">Quit</button>
  </div>
</header>

<div class="wrap">
  <section class="panel">
    <div class="center">
      <div style="font-weight:1000">Target Number</div>
      <div class="bigNum" id="target">----</div>
      <div class="need">Click: <span id="need">----</span></div>

      <div id="startText" style="margin-top:10px; font-weight:1000;">
        Choose difficulty to start
      </div>

      <div class="difficulty">
        <button id="easyBtn" onclick="setDifficulty('easy')">Easy (2 digits)</button>
        <button id="hardBtn" onclick="setDifficulty('hard')">Hard (4 digits)</button>
      </div>

      <div class="arena" id="arena" aria-label="Digit drop arena"></div>
      <div class="hint">+10 correct • −10 wrong • +25 every 5 correct clicks in a row</div>
      <div class="msg" id="msg"></div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

  let audioStarted = false;

function initAudio(){
  if(audioStarted) return;
  audioStarted = true;

  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if(!AudioContextClass) return;

  window.gameAudioCtx = new AudioContextClass();
}

function playTone(freq, duration, type = 'sine', volume = 0.05){
  if(!window.gameAudioCtx) return;

  const ctx = window.gameAudioCtx;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = type;
  osc.frequency.value = freq;

  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();

  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
  osc.stop(ctx.currentTime + duration);
}

function playCorrectSound(){
  playTone(660, 0.12, 'sine', 0.06);
  setTimeout(() => playTone(880, 0.14, 'sine', 0.05), 80);
}

function playWrongSound(){
  playTone(220, 0.18, 'square', 0.05);
  setTimeout(() => playTone(180, 0.2, 'square', 0.04), 90);
}

function playHighScoreSound(){
  playTone(523, 0.12, 'triangle', 0.06);
  setTimeout(() => playTone(659, 0.12, 'triangle', 0.06), 100);
  setTimeout(() => playTone(784, 0.2, 'triangle', 0.06), 200);
}

function celebrateHighScore(){
  if(typeof confetti !== 'function') return;

  confetti({
    particleCount: 140,
    spread: 90,
    origin: { y: 0.6 }
  });

  setTimeout(() => {
    confetti({
      particleCount: 80,
      angle: 60,
      spread: 70,
      origin: { x: 0.1, y: 0.7 }
    });

    confetti({
      particleCount: 80,
      angle: 120,
      spread: 70,
      origin: { x: 0.9, y: 0.7 }
    });
  }, 200);
}

  function readProfile(){
    const raw = sessionStorage.getItem('mq_profile') || localStorage.getItem('mq_profile');
    if(!raw) return null;
    try{
      return JSON.parse(raw);
    }catch{
      return null;
    }
  }

  if(!readProfile()){
    window.location.replace('../index.html');
  }

  const arena = document.getElementById('arena');
  const timeEl = document.getElementById('time');
  const scoreEl = document.getElementById('score');
  const comboEl = document.getElementById('combo');
  const msgEl = document.getElementById('msg');
  const targetEl = document.getElementById('target');
  const needEl = document.getElementById('need');
  const startText = document.getElementById('startText');
  const easyBtn = document.getElementById('easyBtn');
  const hardBtn = document.getElementById('hardBtn');


  let ended = false;
  let mode = null;
  let places = [];
  let currentIndex = 0;
  let digitsMap = {};

  let score = 0;
  let combo = 0;
  let timeLeft = 30;

  let timerId = null;
  let spawnId = null;
  let active = [];
  let last = performance.now();

  function randInt(min, max){
    return Math.floor(Math.random() * (max - min + 1)) + min;
  }

  function updateHUD(){
    timeEl.textContent = timeLeft;
    scoreEl.textContent = score;
    comboEl.textContent = combo;
  }

  function setDifficulty(level){
    initAudio();
    if(started) return;

    mode = level;
    started = true;
    ended = false;

    easyBtn.classList.toggle('active', level === 'easy');
    hardBtn.classList.toggle('active', level === 'hard');
    easyBtn.classList.add('locked');
    hardBtn.classList.add('locked');

    startText.textContent = 'Go! Click the correct digit!';

    resetRound();
    updateHUD();
    startTimer();
    startSpawning();

    last = performance.now();
    requestAnimationFrame(loop);
  }

  function resetRound(){
    arena.innerHTML = '';
    active = [];

    if(mode === 'easy'){
      const tens = randInt(1, 9);
      const ones = randInt(0, 9);
      digitsMap = { tens, ones };
      places = ['tens', 'ones'];
      targetEl.textContent = `${tens}${ones}`;
    } else {
      const thousands = randInt(1, 9);
      const hundreds = randInt(0, 9);
      const tens = randInt(0, 9);
      const ones = randInt(0, 9);
      digitsMap = { thousands, hundreds, tens, ones };
      places = ['thousands', 'hundreds', 'tens', 'ones'];
      targetEl.textContent = `${thousands}${hundreds}${tens}${ones}`;
    }

    currentIndex = 0;
    updateNeed();
  }

  function updateNeed(){
    const p = places[currentIndex];
    const label =
      p === 'thousands' ? 'Thousands' :
      p === 'hundreds' ? 'Hundreds' :
      p === 'tens' ? 'Tens' : 'Ones';

    needEl.textContent = `${label} digit`;
  }

  function startTimer(){
    timeLeft = 30;
    updateHUD();

    timerId = setInterval(() => {
      timeLeft--;
      updateHUD();

      if(timeLeft <= 0){
        endGame();
      }
    }, 1000);
  }

function saveHighScore(){
  let highScore = Number(localStorage.getItem('game2HighScore')) || 0;

  if(score > highScore){
    localStorage.setItem('game2HighScore', score);
    highScore = score;
    playHighScoreSound();
    celebrateHighScore();
  }

  return highScore;
}

  function endGame(){
    if(ended) return;

    ended = true;
    timeLeft = 0;
    updateHUD();

    clearInterval(timerId);
    clearInterval(spawnId);
    timerId = null;
    spawnId = null;

    active.forEach(d => d.frozen = true);

    const highScore = saveHighScore();
    msgEl.textContent = `⏰ Time’s up! Final Score: ${score} | High Score: ${highScore}`;
    msgEl.className = 'msg';
  }

  function startSpawning(){
    const ms = mode === 'easy' ? 750 : 550;

    spawnId = setInterval(() => {
      if(!ended){
        spawnDigit();
      }
    }, ms);
  }

  function spawnDigit(){
    if(ended || timeLeft <= 0) return;

    const needPlace = places[currentIndex];
    const needDigit = digitsMap[needPlace];

    const showCorrect = Math.random() < 0.55;
    let value = showCorrect ? needDigit : randInt(0, 9);

    if(!showCorrect && value === needDigit){
      value = (value + randInt(1, 9)) % 10;
    }

    const arenaWidth = arena.clientWidth;
    const x = randInt(8, Math.max(8, arenaWidth - 72));

    const el = document.createElement('div');
    el.className = 'digit';
    el.textContent = value;
    el.style.background = showCorrect
      ? 'rgba(144,190,109,.55)'
      : 'rgba(255,183,3,.55)';
    el.style.left = x + 'px';
    el.style.top = '-70px';

    const obj = {
      el,
      x,
      y: -70,
      speed: mode === 'easy' ? randInt(120, 180) : randInt(160, 230),
      value,
      frozen: false
    };

    el.addEventListener('click', () => onDigitClick(obj));

    arena.appendChild(el);
    active.push(obj);
  }

  function onDigitClick(obj){
    if(ended || timeLeft <= 0 || obj.frozen) return;

    const needPlace = places[currentIndex];
    const needDigit = digitsMap[needPlace];

    if(obj.value === needDigit){
      playCorrectSound();
      score += 10;
      combo += 1;

      if(combo % 5 === 0){
        score += 25;
        msgEl.textContent = '🔥 Combo Bonus! +25';
        msgEl.className = 'msg good';
      } else {
        msgEl.textContent = '✅ Nice!';
        msgEl.className = 'msg good';
      }

      currentIndex++;

      if(currentIndex >= places.length){
        resetRound();
      } else {
        updateNeed();
      }

      removeDigit(obj);
    } else {
      playWrongSound();
      score = Math.max(0, score - 10);
      combo = 0;
      msgEl.textContent = '❌ Wrong! −10';
      msgEl.className = 'msg bad';
      removeDigit(obj);
    }

    updateHUD();

    setTimeout(() => {
      if(!ended){
        msgEl.textContent = '';
        msgEl.className = 'msg';
      }
    }, 500);
  }

  function removeDigit(obj){
    obj.frozen = true;

    if(obj.el && obj.el.parentNode){
      obj.el.parentNode.removeChild(obj.el);
    }

    active = active.filter(d => d !== obj);
  }

  function loop(now){
    if(!started) return;

    const dt = (now - last) / 1000;
    last = now;

    const bottom = arena.clientHeight + 80;

    active.forEach(d => {
      if(d.frozen) return;
      d.y += d.speed * dt;
      d.el.style.top = d.y + 'px';
    });

    active.slice().forEach(d => {
      if(d.frozen) return;

      if(d.y > bottom){
        const needPlace = places[currentIndex];
        const needDigit = digitsMap[needPlace];

        if(d.value === needDigit && !ended && timeLeft > 0){
          score = Math.max(0, score - 5);
          combo = 0;
          updateHUD();
        }

        removeDigit(d);
      }
    });

    if(!ended && timeLeft > 0){
      requestAnimationFrame(loop);
    }
  }

  function quitGame(){
    const leave = confirm("Quit the game and go back to Home?");
    if(leave){
      window.location.href = "../home.html";
    }
  }

  function restartGame(){
    location.reload();
  }

  updateHUD();
</script>

</body>
</html>
