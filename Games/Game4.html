<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Game 4 • Perimeter Panic</title>
  <style>
    :root{
      --c1:#8ECAE6;
      --c2:#90BE6D;
      --c3:#FFB703;
      --ink:#1b1b1b;
      --muted:#555;
      --card:#ffffff;
      --shadow:0 10px 26px rgba(0,0,0,.08);
    }
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: ui-rounded, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(60vmax 60vmax at 0% 0%, var(--c2) 0 22%, transparent 23%),
        radial-gradient(65vmax 65vmax at 100% 100%, var(--c3) 0 18%, transparent 19%),
        linear-gradient(180deg, #fff, #fff);
      min-height:100vh;
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    main{
      flex:1;
      display:grid;
      place-items:center;
    }

    .card{
      width:min(92vw, 680px);
      background:var(--card);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:16px;
      text-align:center;
    }

    .difficulty{
      display:flex;
      justify-content:center;
      gap:8px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .difficulty button{
      border:none;
      border-radius:999px;
      padding:10px 14px;
      font-weight:1000;
      cursor:pointer;
      background:#eee;
    }

    .difficulty .active{
      background:var(--c1);
    }

    .difficulty .locked{
      opacity:.55;
      pointer-events:none;
    }

    .shapeBox{
      margin:18px auto 10px;
      width:min(100%, 580px);
      min-height:260px;
      background:#fafafa;
      border-radius:22px;
      border:2px solid rgba(0,0,0,.06);
      display:grid;
      place-items:center;
      padding:14px;
    }

    .shapeStage{
      position:relative;
      width:100%;
      height:220px;
      display:grid;
      place-items:center;
    }

    .shape{
      position:relative;
      background:rgba(144,190,109,.35);
      border:3px solid rgba(0,0,0,.08);
    }

    .label{
      position:absolute;
      font-weight:1000;
      background:#fff;
      padding:4px 8px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,.08);
      font-size:14px;
    }

    .answer{
      margin-top:12px;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    input{
      width:150px;
      padding:14px;
      font-size:22px;
      font-weight:1000;
      border-radius:14px;
      border:2px solid #ddd;
      text-align:center;
    }

    input:focus{
      outline:none;
      border-color:var(--c1);
      box-shadow:0 0 0 3px rgba(142,202,230,.3);
    }

    .submit{
      padding:14px 18px;
      font-size:18px;
      font-weight:1000;
      border:none;
      border-radius:14px;
      background:var(--c2);
      cursor:pointer;
    }

    .msg{
      margin-top:12px;
      min-height:26px;
      font-weight:1000;
    }

    .good{ color:#2d7a1f; }
    .bad{ color:#b51e1e; }

    .hint{
      margin-top:8px;
      color:var(--muted);
      font-size:13px;
    }

    .game-topbar{
      background:#ffffff;
      border-radius:20px;
      box-shadow:0 10px 26px rgba(0,0,0,.08);
      padding:14px 16px;
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:14px;
      align-items:center;
    }

    .top-left{ min-width:180px; }

    .game-title{
      font-size:22px;
      font-weight:1000;
      color:#1b1b1b;
    }

    .game-subtitle{
      margin-top:3px;
      font-size:13px;
      color:#555;
      font-weight:700;
    }

    .top-center{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:8px;
    }

    .top-pill{
      background:#f6f6f6;
      padding:9px 12px;
      border-radius:999px;
      font-size:14px;
      font-weight:1000;
      color:#1b1b1b;
    }

    .top-right{
      display:flex;
      gap:8px;
      justify-content:flex-end;
    }

    .top-btn{
      border:none;
      border-radius:14px;
      padding:10px 16px;
      font-size:14px;
      font-weight:1000;
      cursor:pointer;
    }

    .restart-btn{
      background:#8ECAE6;
      color:#0b2a33;
    }

    .quit-btn{
      background:#F28482;
      color:white;
    }

    .restart-btn:hover,
    .quit-btn:hover{
      filter:brightness(.96);
    }

    @media (max-width: 900px){
      .game-topbar{
        grid-template-columns:1fr;
        text-align:center;
      }

      .top-left,
      .top-right{
        display:flex;
        flex-direction:column;
        align-items:center;
      }

      .top-right{
        flex-direction:row;
        justify-content:center;
      }
    }
  </style>
</head>
<body>

<header class="game-topbar">
  <div class="top-left">
    <div class="game-title">📐 Game 4: Perimeter Panic</div>
    <div class="game-subtitle">Solve the perimeter before time runs out!</div>
  </div>

  <div class="top-center">
    <div class="top-pill">⏱ Time: <span id="time">30</span>s</div>
    <div class="top-pill">⭐ Score: <span id="score">0</span></div>
    <div class="top-pill">🔥 Combo: <span id="combo">0</span></div>
  </div>

  <div class="top-right">
    <button class="top-btn restart-btn" onclick="restartGame()">Restart</button>
    <button class="top-btn quit-btn" onclick="quitGame()">Quit</button>
  </div>
</header>

<main>
<section class="card">

  <div id="startText" style="margin-top:10px; font-weight:1000;">
    Choose difficulty to start
  </div>

  <div class="difficulty">
    <button id="easyBtn" onclick="setDifficulty('easy')">Easy</button>
    <button id="hardBtn" onclick="setDifficulty('hard')">Hard</button>
  </div>

  <div id="shapeContainer" style="display:none;">
    <div class="shapeBox">
      <div class="shapeStage" id="shapeStage"></div>
    </div>

    <div class="answer">
      <input id="answer" type="number" placeholder="Perimeter" disabled />
      <button class="submit" id="submitBtn" onclick="check()" disabled>✔</button>
    </div>
  </div>

  <div class="hint">+10 correct • −10 wrong • +5 fast • +25 every 5 combo</div>
  <div class="msg" id="msg"></div>

</section>
</main>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>

<script>
let audioStarted = false;

function initAudio(){
  if(audioStarted) return;
  audioStarted = true;

  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if(!AudioContextClass) return;

  window.gameAudioCtx = new AudioContextClass();
}

function playTone(freq, duration, type = 'sine', volume = 0.05){
  if(!window.gameAudioCtx) return;

  const ctx = window.gameAudioCtx;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = volume;

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
  osc.stop(ctx.currentTime + duration);
}

function playCorrectSound(){
  playTone(660, 0.12, 'sine', 0.06);
  setTimeout(() => playTone(880, 0.14, 'sine', 0.05), 80);
}

function playWrongSound(){
  playTone(220, 0.18, 'square', 0.05);
  setTimeout(() => playTone(180, 0.2, 'square', 0.04), 90);
}

function playHighScoreSound(){
  playTone(523, 0.12, 'triangle', 0.06);
  setTimeout(() => playTone(659, 0.12, 'triangle', 0.06), 100);
  setTimeout(() => playTone(784, 0.2, 'triangle', 0.06), 200);
}

function celebrateHighScore(){
  if(typeof confetti !== 'function') return;

  confetti({
    particleCount: 140,
    spread: 90,
    origin: { y: 0.6 }
  });

  setTimeout(() => {
    confetti({
      particleCount: 80,
      angle: 60,
      spread: 70,
      origin: { x: 0.1, y: 0.7 }
    });

    confetti({
      particleCount: 80,
      angle: 120,
      spread: 70,
      origin: { x: 0.9, y: 0.7 }
    });
  }, 200);
}

function readProfile(){
  const raw = sessionStorage.getItem('mq_profile') || localStorage.getItem('mq_profile');
  if(!raw) return null;
  try{
    return JSON.parse(raw);
  }catch{
    return null;
  }
}

if(!readProfile()){
  window.location.replace('../index.html');
}

let started = false;
let ended = false;
let mode = null;
let timeLeft = 30;
let score = 0;
let combo = 0;
let timer = null;
let shapeData = null;
let roundStart = 0;

const timeEl = document.getElementById('time');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const shapeStage = document.getElementById('shapeStage');
const shapeContainer = document.getElementById('shapeContainer');
const msgEl = document.getElementById('msg');
const ansEl = document.getElementById('answer');
const submitBtn = document.getElementById('submitBtn');
const easyBtn = document.getElementById('easyBtn');
const hardBtn = document.getElementById('hardBtn');
const startText = document.getElementById('startText');

function rand(min, max){
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function updateHUD(){
  timeEl.textContent = timeLeft;
  scoreEl.textContent = score;
  comboEl.textContent = combo;
}

function setDifficulty(level){
  initAudio();
  if(started) return;

  started = true;
  ended = false;
  mode = level;

  easyBtn.classList.toggle('active', level === 'easy');
  hardBtn.classList.toggle('active', level === 'hard');
  easyBtn.classList.add('locked');
  hardBtn.classList.add('locked');

  startText.textContent = 'Solve as many as you can!';
  shapeContainer.style.display = 'block';

  ansEl.disabled = false;
  submitBtn.disabled = false;

  newShape();
  startTimer();
  updateHUD();
}

function newShape(){
  if(ended) return;

  shapeStage.innerHTML = '';

  const isRectangle = Math.random() < 0.5;

  if(isRectangle || mode === 'easy'){
    const width = mode === 'easy' ? rand(2, 9) : rand(2, 14);
    const height = mode === 'easy' ? rand(2, 9) : rand(2, 12);

    shapeData = {
      type: 'rectangle',
      width,
      height,
      perimeter: 2 * (width + height)
    };

    renderRectangle(width, height);
  } else {
    const sideA = rand(3, 10);
    const sideB = rand(3, 10);
    const sideC = rand(3, 10);

    shapeData = {
      type: 'triangle',
      sideA,
      sideB,
      sideC,
      perimeter: sideA + sideB + sideC
    };

    renderTriangle(sideA, sideB, sideC);
  }

  ansEl.value = '';
  ansEl.focus();
  roundStart = performance.now();

  msgEl.textContent = '';
  msgEl.className = 'msg';
}

function renderRectangle(width, height){
  const shape = document.createElement('div');
  shape.className = 'shape';
  shape.style.width = (width * 26) + 'px';
  shape.style.height = (height * 20) + 'px';

  const topLabel = document.createElement('div');
  topLabel.className = 'label';
  topLabel.textContent = width;
  topLabel.style.top = '-16px';
  topLabel.style.left = '50%';
  topLabel.style.transform = 'translateX(-50%)';

  const sideLabel = document.createElement('div');
  sideLabel.className = 'label';
  sideLabel.textContent = height;
  sideLabel.style.top = '50%';
  sideLabel.style.right = '-18px';
  sideLabel.style.transform = 'translateY(-50%)';

  shape.appendChild(topLabel);
  shape.appendChild(sideLabel);
  shapeStage.appendChild(shape);
}

function renderTriangle(a, b, c){
  const wrap = document.createElement('div');
  wrap.style.position = 'relative';
  wrap.style.width = '220px';
  wrap.style.height = '180px';

  const triangle = document.createElement('div');
  triangle.style.position = 'absolute';
  triangle.style.left = '50%';
  triangle.style.top = '50%';
  triangle.style.transform = 'translate(-50%, -50%)';
  triangle.style.width = '0';
  triangle.style.height = '0';
  triangle.style.borderLeft = '90px solid transparent';
  triangle.style.borderRight = '90px solid transparent';
  triangle.style.borderBottom = '150px solid rgba(144,190,109,.35)';
  triangle.style.filter = 'drop-shadow(0 8px 12px rgba(0,0,0,.08))';

  const base = document.createElement('div');
  base.className = 'label';
  base.textContent = a;
  base.style.bottom = '0';
  base.style.left = '50%';
  base.style.transform = 'translateX(-50%)';

  const left = document.createElement('div');
  left.className = 'label';
  left.textContent = b;
  left.style.left = '18px';
  left.style.top = '86px';

  const right = document.createElement('div');
  right.className = 'label';
  right.textContent = c;
  right.style.right = '18px';
  right.style.top = '86px';

  wrap.appendChild(triangle);
  wrap.appendChild(base);
  wrap.appendChild(left);
  wrap.appendChild(right);
  shapeStage.appendChild(wrap);
}

function check(){
  if(!started || ended || timeLeft <= 0) return;

  const correct = shapeData.perimeter;
  const user = Number(ansEl.value);
  const secs = (performance.now() - roundStart) / 1000;

  if(user === correct){
    playCorrectSound();
    score += 10;
    combo += 1;

    if(secs <= 3){
      score += 5;
      msgEl.textContent = '✅ Correct! +10 (Fast +5)';
      msgEl.className = 'msg good';
    } else {
      msgEl.textContent = '✅ Correct!';
      msgEl.className = 'msg good';
    }

    if(combo % 5 === 0){
      score += 25;
      msgEl.textContent = '🔥 Combo Bonus! +25';
      msgEl.className = 'msg good';
    }
  } else {
    playWrongSound();
    score = Math.max(0, score - 10);
    combo = 0;
    msgEl.textContent = '❌ Wrong!';
    msgEl.className = 'msg bad';
  }

  updateHUD();

  setTimeout(() => {
    if(!ended){
      newShape();
    }
  }, 300);
}

function saveHighScore(){
  let highScore = Number(localStorage.getItem('game4HighScore')) || 0;

  if(score > highScore){
    localStorage.setItem('game4HighScore', score);
    highScore = score;
    playHighScoreSound();
    celebrateHighScore();
  }

  return highScore;
}

function startTimer(){
  timeLeft = 30;
  updateHUD();

  timer = setInterval(() => {
    timeLeft--;
    updateHUD();

    if(timeLeft <= 0){
      endGame();
    }
  }, 1000);
}

async function endGame(){
  if(ended) return;

  ended = true;
  timeLeft = 0;
  updateHUD();

  clearInterval(timer);
  timer = null;

  ansEl.disabled = true;
  submitBtn.disabled = true;

  const highScore = saveHighScore();

  try{
    await submitScore(4, score);
  }catch(error){
    console.error("Submit score failed:", error);
  }

  msgEl.textContent = `⏰ Time’s up! Final Score: ${score} | High Score: ${highScore}`;
  msgEl.className = 'msg';
}

ansEl.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    check();
  }
});

function quitGame(){
  const leave = confirm("Quit the game and go back to Home?");
  if(leave){
    window.location.href = "../home.html";
  }
}

function restartGame(){
  location.reload();
}

updateHUD();
</script>
</body>
</html>
