<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Game 4 • Area Attack</title>

<style>
:root{
  --c1:#8ECAE6; --c2:#90BE6D; --c3:#FFB703;
  --ink:#1b1b1b; --muted:#555; --card:#ffffff;
  --shadow:0 10px 26px rgba(0,0,0,.08);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family: ui-rounded, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
  color:var(--ink);
  background:
    radial-gradient(60vmax 60vmax at 0% 0%, var(--c1) 0 22%, transparent 23%),
    radial-gradient(65vmax 65vmax at 100% 100%, var(--c2) 0 22%, transparent 23%),
    linear-gradient(180deg, #fff, #fff);
  min-height:100vh;
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

header{
  background:var(--card);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:12px 14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.title{font-weight:1000}
.btn{
  border:none;
  border-radius:14px;
  padding:10px 14px;
  font-weight:900;
  cursor:pointer;
  background:#f1f1f1;
}

main{flex:1; display:grid; place-items:center;}

.card{
  width:min(92vw,600px);
  background:var(--card);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:16px;
  text-align:center;
}

.hud{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  font-weight:1000;
}
.pill{
  background:#f6f6f6;
  padding:8px 12px;
  border-radius:999px;
  font-size:14px;
}

.difficulty{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:12px;
}
.difficulty button{
  border:none;
  border-radius:999px;
  padding:10px 14px;
  font-weight:1000;
  cursor:pointer;
  background:#eee;
}
.difficulty .active{background:var(--c1)}
.difficulty .locked{opacity:.5; pointer-events:none;}

.rectangle{
  margin:20px auto 10px;
  background:rgba(144,190,109,.35);
  border:3px solid rgba(0,0,0,.08);
  position:relative;
}

.dimension{
  font-weight:1000;
  margin-top:4px;
}

.answer{
  margin-top:12px;
  display:flex;
  justify-content:center;
  gap:10px;
}

input{
  width:140px;
  padding:14px;
  font-size:22px;
  font-weight:1000;
  border-radius:14px;
  border:2px solid #ddd;
  text-align:center;
}
input:focus{
  outline:none;
  border-color:var(--c1);
  box-shadow:0 0 0 3px rgba(142,202,230,.3);
}

.submit{
  padding:14px 18px;
  font-size:18px;
  font-weight:1000;
  border:none;
  border-radius:14px;
  background:var(--c2);
  cursor:pointer;
}

.msg{
  margin-top:12px;
  min-height:26px;
  font-weight:1000;
}
.good{color:#2d7a1f}
.bad{color:#b51e1e}

.hint{
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
}
</style>
</head>
<body>

<header>
  <div class="title">🟩 Game 4: Area Attack</div>
  <button class="btn" onclick="goHome()">Home</button>
</header>

<main>
<section class="card">

  <div class="hud">
    <div class="pill">⏱ Time: <span id="time">30</span>s</div>
    <div class="pill">⭐ Score: <span id="score">0</span></div>
    <div class="pill">🔥 Combo: <span id="combo">0</span></div>
  </div>

  <div id="startText" style="margin-top:10px; font-weight:1000;">
    Choose difficulty to start
  </div>

  <div class="difficulty">
    <button id="easyBtn" onclick="setDifficulty('easy')">Easy</button>
    <button id="hardBtn" onclick="setDifficulty('hard')">Hard</button>
  </div>

  <div id="rectContainer" style="display:none;">
    <div id="rectangle" class="rectangle"></div>
    <div class="dimension" id="dimensionText"></div>

    <div class="answer">
      <input id="answer" type="number" placeholder="Area" />
      <button class="submit" onclick="check()">✔</button>
    </div>
  </div>

  <div class="hint">+10 correct • −10 wrong • +5 fast • +25 every 5 combo</div>
  <div class="msg" id="msg"></div>

</section>
</main>

<script>
function readProfile(){
  const raw = sessionStorage.getItem('mq_profile') || localStorage.getItem('mq_profile');
  if(!raw) return null;
  try{return JSON.parse(raw);}catch{return null;}
}
if(!readProfile()) window.location.replace('../index.html');

let started=false;
let mode=null;
let timeLeft=30;
let score=0;
let combo=0;
let timer=null;
let width=0,height=0;
let roundStart=0;

const timeEl=document.getElementById('time');
const scoreEl=document.getElementById('score');
const comboEl=document.getElementById('combo');
const rect=document.getElementById('rectangle');
const dimensionText=document.getElementById('dimensionText');
const rectContainer=document.getElementById('rectContainer');
const msgEl=document.getElementById('msg');
const ansEl=document.getElementById('answer');

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

function setDifficulty(level){
  if(started) return;
  started=true;
  mode=level;

  document.getElementById('easyBtn').classList.toggle('active',level==='easy');
  document.getElementById('hardBtn').classList.toggle('active',level==='hard');
  document.getElementById('easyBtn').classList.add('locked');
  document.getElementById('hardBtn').classList.add('locked');

  document.getElementById('startText').textContent='Solve as many as you can!';
  rectContainer.style.display='block';

  newRectangle();
  startTimer();
}

function newRectangle(){
  width = (mode==='easy') ? rand(2,9) : rand(2,15);
  height = (mode==='easy') ? rand(2,9) : rand(2,15);

  rect.style.width = (width*20)+'px';
  rect.style.height = (height*20)+'px';

  dimensionText.textContent = `${width} × ${height}`;
  ansEl.value='';
  ansEl.focus();
  roundStart = performance.now();
}

function check(){
  if(timeLeft<=0) return;

  const correct = width*height;
  const user = Number(ansEl.value);
  const secs = (performance.now()-roundStart)/1000;

  if(user===correct){
    score+=10;
    combo+=1;

    if(secs<=3){ score+=5; }

    if(combo%5===0){
      score+=25;
      msgEl.textContent='🔥 Combo Bonus!';
      msgEl.className='msg good';
    } else {
      msgEl.textContent='✅ Correct!';
      msgEl.className='msg good';
    }
  } else {
    score=Math.max(0,score-10);
    combo=0;
    msgEl.textContent='❌ Wrong!';
    msgEl.className='msg bad';
  }

  scoreEl.textContent=score;
  comboEl.textContent=combo;

  setTimeout(newRectangle,300);
}

function startTimer(){
  timer=setInterval(()=>{
    timeLeft--;
    timeEl.textContent=timeLeft;
    if(timeLeft<=0){
      clearInterval(timer);
      msgEl.textContent=`⏰ Time’s up! Final score: ${score}`;
    }
  },1000);
}

function goHome(){
  window.location.href='../home.html';
}

ansEl.addEventListener('keydown',e=>{
  if(e.key==='Enter') check();
});
</script>

</body>
</html>
