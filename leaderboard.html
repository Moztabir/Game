<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MathQuest Leaderboard</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      margin:0;
      padding:24px;
      background:#f7f7f7;
      color:#111;
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      background:#fff;
      padding:20px;
      border-radius:18px;
      box-shadow:0 10px 24px rgba(0,0,0,.08);
    }

    h1{
      margin-top:0;
    }

    button{
      padding:10px 14px;
      border:none;
      border-radius:10px;
      background:#8ECAE6;
      font-weight:700;
      cursor:pointer;
      margin-bottom:16px;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th, td{
      padding:12px 10px;
      border-bottom:1px solid #eee;
      text-align:left;
    }

    th{
      background:#fafafa;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>School Leaderboard</h1>
    <button onclick="loadLeaderboard()">Refresh</button>

    <table>
      <thead>
        <tr>
          <th>Player ID</th>
          <th>Game</th>
          <th>Score</th>
          <th>Submitted</th>
        </tr>
      </thead>
      <tbody id="leaderboardBody">
        <tr><td colspan="4">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>

  <script>
    async function loadLeaderboard(){
      const tbody = document.getElementById("leaderboardBody");
      tbody.innerHTML = "<tr><td colspan='4'>Loading...</td></tr>";

      const { data, error } = await supabaseClient
        .from("score_attempts")
        .select("*")
        .order("score", { ascending: false })
        .limit(20);

      if(error){
        tbody.innerHTML = `<tr><td colspan="4">Error: ${error.message}</td></tr>`;
        return;
      }

      if(!data || data.length === 0){
        tbody.innerHTML = "<tr><td colspan='4'>No scores yet.</td></tr>";
        return;
      }

      tbody.innerHTML = data.map(row => `
        <tr>
          <td>${row.player_id}</td>
          <td>${row.game_number}</td>
          <td>${row.score}</td>
          <td>${new Date(row.submitted_at).toLocaleString()}</td>
        </tr>
      `).join("");
    }

    loadLeaderboard();
  </script>
</body>
</html>
