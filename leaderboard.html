<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MathQuest Arcade • Leaderboard</title>
  <style>
    :root{
      --gold:#f4c542;
      --silver:#c7ced6;
      --bronze:#c98a4a;
      --bg1:#8ECAE6;
      --bg2:#90BE6D;
      --bg3:#FFB703;
      --ink:#1b1b1b;
      --muted:#5a5a5a;
      --card:#ffffff;
      --shadow:0 12px 30px rgba(0,0,0,.10);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:ui-rounded, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(70vmax 70vmax at 0% 0%, rgba(142,202,230,.45) 0 20%, transparent 21%),
        radial-gradient(70vmax 70vmax at 100% 100%, rgba(144,190,109,.35) 0 18%, transparent 19%),
        linear-gradient(180deg,#fff,#fff);
      min-height:100vh;
      padding:20px;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .topbar{
      background:var(--card);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:16px 18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      flex-wrap:wrap;
    }

    .titleWrap h1{
      margin:0;
      font-size:30px;
      line-height:1.05;
    }

    .titleWrap p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .topActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      border:none;
      border-radius:14px;
      padding:11px 16px;
      font-weight:1000;
      cursor:pointer;
      font-size:14px;
    }

    .btn-home{
      background:#f1f1f1;
      color:#222;
    }

    .btn-refresh{
      background:var(--bg1);
      color:#0b2a33;
    }

    .statusCard{
      background:var(--card);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:14px 18px;
      display:flex;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      align-items:center;
    }

    .statusText{
      font-size:14px;
      color:var(--muted);
    }

    .myRank{
      font-weight:1000;
      background:#f7f7f7;
      padding:10px 14px;
      border-radius:14px;
    }

    .podiumSection{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
      align-items:end;
    }

    .podiumCard{
      position:relative;
      background:var(--card);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:18px 16px;
      text-align:center;
      overflow:hidden;
      min-height:240px;
    }

    .podiumCard::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:.18;
      pointer-events:none;
    }

    .first::before{ background:linear-gradient(180deg,var(--gold),transparent 70%); }
    .second::before{ background:linear-gradient(180deg,var(--silver),transparent 70%); }
    .third::before{ background:linear-gradient(180deg,var(--bronze),transparent 70%); }

    .first{
      transform:translateY(-12px);
      animation:floatGold 2.8s ease-in-out infinite;
      border:2px solid rgba(244,197,66,.55);
    }

    .second{
      animation:floatSilver 3.2s ease-in-out infinite;
      border:2px solid rgba(199,206,214,.55);
    }

    .third{
      animation:floatBronze 3s ease-in-out infinite;
      border:2px solid rgba(201,138,74,.55);
    }

    @keyframes floatGold{
      0%,100%{ transform:translateY(-12px) }
      50%{ transform:translateY(-22px) }
    }

    @keyframes floatSilver{
      0%,100%{ transform:translateY(0) }
      50%{ transform:translateY(-10px) }
    }

    @keyframes floatBronze{
      0%,100%{ transform:translateY(0) }
      50%{ transform:translateY(-8px) }
    }

    .rankBadge{
      width:58px;
      height:58px;
      margin:0 auto 10px;
      border-radius:999px;
      display:grid;
      place-items:center;
      font-size:24px;
      font-weight:1000;
      color:#1b1b1b;
      box-shadow:0 8px 18px rgba(0,0,0,.10);
    }

    .rank1{ background:var(--gold); }
    .rank2{ background:var(--silver); }
    .rank3{ background:var(--bronze); color:#fff; }

    .playerName{
      font-size:22px;
      font-weight:1000;
      margin-top:6px;
    }

    .playerClass{
      color:var(--muted);
      font-size:14px;
      margin-top:4px;
    }

    .totalScore{
      margin-top:14px;
      font-size:32px;
      font-weight:1000;
    }

    .totalLabel{
      color:var(--muted);
      font-size:13px;
      font-weight:900;
    }

    .gameBreakdown{
      margin-top:14px;
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
    }

    .mini{
      background:#f7f7f7;
      border-radius:12px;
      padding:8px 4px;
      font-size:12px;
      font-weight:900;
    }

    .tableCard{
      background:var(--card);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:14px;
      overflow:hidden;
    }

    .tableWrap{
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:860px;
    }

    th, td{
      padding:14px 12px;
      border-bottom:1px solid #eee;
      text-align:left;
      font-size:14px;
    }

    th{
      background:#fafafa;
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    tr:hover td{
      background:#fcfcfc;
    }

    .rankCell{
      font-weight:1000;
      width:70px;
    }

    .nameCell{
      font-weight:1000;
    }

    .muted{
      color:var(--muted);
    }

    .empty,
    .loading,
    .error{
      background:var(--card);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:24px;
      text-align:center;
      font-weight:900;
    }

    @media (max-width:900px){
      .podiumSection{
        grid-template-columns:1fr;
      }

      .first,
      .second,
      .third{
        transform:none;
        animation:none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="topbar">
      <div class="titleWrap">
        <h1>🏆 School Leaderboard</h1>
        <p>Best score from each game is added into one total score.</p>
      </div>

      <div class="topActions">
        <button class="btn btn-refresh" onclick="loadLeaderboard()">Refresh</button>
        <button class="btn btn-home" onclick="window.location.href='home.html'">Back Home</button>
      </div>
    </section>

    <section class="statusCard">
      <div class="statusText" id="statusText">Loading leaderboard...</div>
      <div class="myRank" id="myRankBox">Your rank: —</div>
    </section>

    <section id="podiumSection" class="podiumSection"></section>

    <section class="tableCard">
      <div class="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>Class</th>
              <th>Total</th>
              <th>Game 1</th>
              <th>Game 2</th>
              <th>Game 3</th>
              <th>Game 4</th>
              <th>Game 5</th>
            </tr>
          </thead>
          <tbody id="leaderboardBody">
            <tr><td colspan="9" class="loading">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>

  <script>
  const playerNameInput = document.getElementById("playerName");
  const classCodeInput = document.getElementById("classCode");
  const playBtn = document.getElementById("playBtn");
  const clearBtn = document.getElementById("clearBtn");
  const message = document.getElementById("message");

  function showMessage(text, type) {
    message.textContent = text;
    message.className = "message " + type;
  }

  async function registerPlayer(name, classCode) {
    const { data: existingPlayer, error: findError } = await supabaseClient
      .from("players")
      .select("id, full_name, class_code")
      .eq("full_name", name)
      .eq("class_code", classCode)
      .maybeSingle();

    if (findError) {
      console.error("Player lookup failed:", findError);
      throw new Error(findError.message);
    }

    if (existingPlayer) {
      localStorage.setItem("mq_player_id", existingPlayer.id);
      return existingPlayer;
    }

    const { data: newPlayer, error: insertError } = await supabaseClient
      .from("players")
      .insert([
        {
          full_name: name,
          class_code: classCode
        }
      ])
      .select("id, full_name, class_code")
      .single();

    if (insertError) {
      console.error("Player creation failed:", insertError);
      throw new Error(insertError.message);
    }

    localStorage.setItem("mq_player_id", newPlayer.id);
    return newPlayer;
  }

  async function validateLogin() {
    const name = playerNameInput.value.trim();
    const classCode = classCodeInput.value.trim();

    const validName = /^[A-Za-z]+$/.test(name);
    const validCode = classCode === "3F92";

    if (!name) {
      showMessage("Please enter your first name.", "error");
      return;
    }

    if (!validName) {
      showMessage("Use first name only with letters only.", "error");
      return;
    }

    if (!classCode) {
      showMessage("Please enter the class code.", "error");
      return;
    }

    if (!validCode) {
      showMessage('Class code must be "3F92".', "error");
      return;
    }

    try {
      playBtn.disabled = true;
      showMessage("Signing you in...", "success");

      const player = await registerPlayer(name, classCode);

      const profile = {
        id: player.id,
        name: player.full_name,
        code: player.class_code
      };

      localStorage.setItem("mq_profile", JSON.stringify(profile));
      localStorage.setItem("mathivPlayerName", name);
      localStorage.setItem("mathivClassCode", classCode);

      showMessage("Login successful. Redirecting...", "success");

      setTimeout(() => {
        window.location.href = "home.html";
      }, 700);
    } catch (err) {
      console.error(err);
      showMessage("Login failed: " + err.message, "error");
      playBtn.disabled = false;
    }
  }

  playBtn.addEventListener("click", validateLogin);

  clearBtn.addEventListener("click", () => {
    playerNameInput.value = "";
    classCodeInput.value = "";
    showMessage("", "");
    playerNameInput.focus();
  });

  playerNameInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") validateLogin();
  });

  classCodeInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") validateLogin();
  });
</script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
</body>
</html>
